apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: troubleshoot
spec:
  selector:
    matchLabels:
      app: web
  replicas: 1
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: webapp
        image: nginx:1.20.33
        ports:
        - containerPort: 80
