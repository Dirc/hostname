name: golangci-lint
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: tidy
        uses: katexochen/go-tidy-check@v2

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
